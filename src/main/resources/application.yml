spring:
  application:
    name: cowork-connector-example

  threads:
    virtual:
      enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          # Replace with your identity provider's issuer URI.
          # The server will auto-discover JWKS from <issuer-uri>/.well-known/openid-configuration.
          # Examples:
          #   Keycloak: https://keycloak.example.com/realms/my-realm
          #   Auth0:    https://your-tenant.us.auth0.com/
          #   Okta:     https://dev-12345678.okta.com/oauth2/default
          issuer-uri: https://your-identity-provider.example.com

mocapi:
  server-info:
    name: cowork-connector-example
    version: 1.0.0
  instructions: >
    This connector exposes tools for interacting with the local filesystem,
    system information, a safe shell command runner, and a to-do list manager.
    Use the filesystem tools to browse and search files. Use system.info to
    inspect the host environment. Use shell.run for simple read-only commands.
    Use the todo.* tools to manage a persistent in-memory task list.

server:
  port: 8080
