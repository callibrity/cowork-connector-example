name: Release JVM image

# Temporarily building a JVM image (not native) so releases turn around in
# ~1 minute instead of ~7-8. Switch back to the native profile once the
# upstream mocapi native-image fix lands.

on:
  release:
    types: [created]

jobs:
  jvm-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/${{ github.repository }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set pom version to tag
        run: mvn --batch-mode versions:set -DnewVersion=${GITHUB_REF_NAME} -DgenerateBackupPoms=false

      - name: Build JVM image via buildpacks
        run: |
          mvn --batch-mode spring-boot:build-image -DskipTests \
            -Dspring-boot.build-image.imageName=${IMAGE}:${GITHUB_REF_NAME}

      - name: Tag as latest
        run: docker tag ${IMAGE}:${GITHUB_REF_NAME} ${IMAGE}:latest

      - name: Push image
        run: |
          docker push ${IMAGE}:${GITHUB_REF_NAME}
          docker push ${IMAGE}:latest
